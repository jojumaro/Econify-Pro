<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Econify Pro - Registro</title>
    <link rel="stylesheet" href="Styles.css">
</head>
<body>
<div class="categories-container">

    <div class="categories-header">
        <h1 class="section-title">Categorías</h1>
        <button class="add-category-btn">
            <i data-lucide="plus"></i> Nueva categoría
        </button>
    </div>

    <div class="categories-grid">

<!-- SUPERMERCADO -->
<div class="category-card card">
    <div class="category-icon blue">
        <i data-lucide="shopping-cart"></i>
    </div>
    <div class="category-info">
        <h3 class="category-name">Supermercado</h3>
        <span class="category-type gasto">Gasto</span>
    </div>
    <div class="category-actions">
        <button class="icon-btn-small"><i data-lucide="edit"></i></button>
        <button class="icon-btn-small delete"><i data-lucide="trash"></i></button>
    </div>
</div>

<!-- SALARIO -->
<div class="category-card card">
    <div class="category-icon green">
        <i data-lucide="wallet"></i>
    </div>
    <div class="category-info">
        <h3 class="category-name">Salario</h3>
        <span class="category-type ingreso">Ingreso</span>
    </div>
    <div class="category-actions">
        <button class="icon-btn-small"><i data-lucide="edit"></i></button>
        <button class="icon-btn-small delete"><i data-lucide="trash"></i></button>
    </div>
</div>

    </div>
</div>

    <script>
        lucide.createIcons();
