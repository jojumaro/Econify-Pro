<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Econify Pro - Metas</title>
    <link rel="stylesheet" href="Styles.css">
</head>
<body>
    <div class="app-container">

        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <i data-lucide="zap"></i>
                </div>
                <span class="logo-text">Econify Pro</span>
            </div>

            <nav class="nav-menu">
                <a href="#" class="nav-item">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item">
                    <i data-lucide="arrow-right-left"></i>
                    <span>Transacciones</span>
                </a>
                <a href="#" class="nav-item active">
                    <i data-lucide="target"></i>
                    <span>Metas</span>
                </a>
                <a href="#" class="nav-item">
                    <i data-lucide="user"></i>
                    <span>Perfil</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">

  <header class="header">
    <h1 class="greeting">Metas</h1>
    <div class="header-actions">
        <button class="icon-btn">
            <i data-lucide="bell"></i>
        </button>
        <div class="user-avatar">J</div>
    </div>
</header>

<div class="goals-card card">

    <div class="goals-header">
        <button class="new-goal-btn">
            <i data-lucide="plus"></i>
            Crear meta
        </button>
    </div>

    <div class="goals-grid">

        <!-- Meta 1 -->
        <div class="goal-item card">
            <div class="goal-icon blue">
                <i data-lucide="piggy-bank"></i>
            </div>

            <div class="goal-info">
                <h4 class="goal-title">Ahorro vacaciones</h4>
                <p class="goal-amount">450 € / 1.200 €</p>

                <div class="goal-progress-row">
                    <span class="goal-date">30 Jun 2026</span>

                    <div class="goal-progress-bar">
                        <div class="goal-progress" style="width: 37%;"></div>
                    </div>

                    <span class="goal-percent">37%</span>
                </div>

                <button class="goal-details-btn">Detalles</button>
            </div>
        </div>

        <!-- Meta 2 -->
        <div class="goal-item card">
            <div class="goal-icon green">
                <i data-lucide="home"></i>
            </div>

            <div class="goal-info">
                <h4 class="goal-title">Fondo para casa</h4>
                <p class="goal-amount">8.000 € / 20.000 €</p>

                <div class="goal-progress-row">
                    <span class="goal-date">01 Ene 2027</span>

                    <div class="goal-progress-bar">
                        <div class="goal-progress" style="width: 40%;"></div>
                    </div>

                    <span class="goal-percent">40%</span>
                </div>

                <button class="goal-details-btn">Detalles</button>
            </div>
        </div>

        <!-- Meta 3 -->
        <div class="goal-item card">
            <div class="goal-icon orange">
                <i data-lucide="graduation-cap"></i>
            </div>

            <div class="goal-info">
                <h4 class="goal-title">Formación profesional</h4>
                <p class="goal-amount">300 € / 1.000 €</p>

                <div class="goal-progress-row">
                    <span class="goal-date">15 Dic 2026</span>

                    <div class="goal-progress-bar">
                        <div class="goal-progress" style="width: 30%;"></div>
                    </div>

                    <span class="goal-percent">30%</span>
                </div>

                <button class="goal-details-btn">Detalles</button>
            </div>
        </div>

        <!-- Meta 4 -->
        <div class="goal-item card">
            <div class="goal-icon purple">
                <i data-lucide="car"></i>
            </div>

            <div class="goal-info">
                <h4 class="goal-title">Coche nuevo</h4>
                <p class="goal-amount">2.500 € / 10.000 €</p>

                <div class="goal-progress-row">
                    <span class="goal-date">01 Ago 2027</span>

                    <div class="goal-progress-bar">
                        <div class="goal-progress" style="width: 25%;"></div>
                    </div>

                    <span class="goal-percent">25%</span>
                </div>

                <button class="goal-details-btn">Detalles</button>
            </div>
        </div>

    </div>

</div>

        </main>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
