<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Econify Pro - Crear meta</title>
    <link rel="stylesheet" href="Styles.css">
</head>
<body>
<div class="goal-detail-card card">

    <!-- Cabecera visual -->
    <div class="goal-header">
        <div class="goal-icon-large blue">
            <i data-lucide="piggy-bank"></i>
        </div>

        <div class="goal-header-info">
            <h2 class="goal-title-large">Ahorro vacaciones</h2>
            <p class="goal-date-large">Fecha objetivo: 30 Jun 2026</p>
            <p class="goal-percent-large">37%</p>
        </div>
    </div>

    <!-- Barra de progreso grande -->
    <div class="goal-progress-big">
        <div class="goal-progress-fill" style="width: 37%;"></div>
    </div>

    <!-- Datos clave -->
    <div class="goal-stats">
        <div class="stat-item">
            <span class="stat-label">Ahorrado</span>
            <span class="stat-value">450 €</span>
        </div>

        <div class="stat-item">
            <span class="stat-label">Objetivo</span>
            <span class="stat-value">1.200 €</span>
        </div>

        <div class="stat-item">
            <span class="stat-label">Restante</span>
            <span class="stat-value">750 €</span>
        </div>
    </div>

    <!-- Historial de aportaciones -->
    <h3 class="section-subtitle">Aportaciones</h3>

    <div class="contributions-list">
        <div class="contribution-item">
            <span>+50 €</span>
            <span class="contribution-date">10 Feb 2026</span>
        </div>

        <div class="contribution-item">
            <span>+100 €</span>
            <span class="contribution-date">01 Feb 2026</span>
        </div>
    </div>

    <!-- Botones -->
    <div class="goal-actions">
        <button class="edit-btn">Guardar meta</button>
        <button class="delete-btn">Eliminar meta</button>
    </div>

</div>

</body>
</html>
