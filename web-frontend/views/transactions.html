{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Econify Pro - Transacciones</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="{% static 'css/layouts/dashboard.css' %}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="dashboard-container">
        {% include "layout/_sidebar.html" with active_tab="transactions" %}

        <main class="main-content">
            <header class="dashboard-header">
                <div>
                    <h1>Transacciones</h1>
                    <p style="color: var(--text-secondary);">Historial detallado de tus movimientos.</p>
                </div>
                <button id="btn-add-transaction" class="login-btn btn btn-primary" style="width: auto; padding: 0 20px; height: 45px; display: flex; align-items: center; gap: 8px;">
                    <i data-lucide="plus"></i>
                    <span>Nueva Transacción</span>
                </button>
            </header>

            <div class="card" style="display: flex; gap: 20px; padding: 15px; margin-top: 20px; align-items: center; flex-wrap: wrap;">
                <div class="input-group" style="margin: 0; flex: 1; min-width: 150px;">
                    <select id="filter-type" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--border-color);">
                        <option value="">Todos los tipos</option>
                        <option value="GASTO">Gastos</option>
                        <option value="INGRESO">Ingresos</option>
                    </select>
                </div>
                <div class="input-group" style="margin: 0; flex: 1; min-width: 150px;">
                    <select id="filter-category" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--border-color);">
                        <option value="">Todas las categorías</option>
                    </select>
                </div>
            </div>

            <div class="card" style="margin-top: 20px; padding: 0; overflow: hidden;">
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead style="background: #f8fafc; border-bottom: 1px solid var(--border-color);">
                        <tr>
                            <th style="padding: 15px;">Fecha</th>
                            <th style="padding: 15px;">Descripción</th>
                            <th style="padding: 15px;">Categoría</th>
                            <th style="padding: 15px;">Monto</th>
                            <th style="padding: 15px; text-align: right;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="transactions-body">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="transaction-modal" class="custom-alert hidden" style="background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 1000; display: flex; align-items: center; justify-content: center; position: fixed; inset: 0;">
        <div class="card" style="width: 100%; max-width: 500px; padding: 25px; border-radius: 16px;">
            <h3 id="transaction-modal-title">Registrar Movimiento</h3>
            <input type="hidden" id="transaction-id">

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;">
                <div class="input-group">
                    <label>Monto (€)</label>
                    <input type="number" id="t-amount" step="0.01" placeholder="0.00" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color);">
                </div>
                <div class="input-group">
                    <label>Tipo</label>
                    <select id="t-type" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color);">
                        <option value="GASTO">Gasto</option>
                        <option value="INGRESO">Ingreso</option>
                    </select>
                </div>
            </div>

            <div class="input-group" style="margin-top: 15px;">
                <label>Categoría</label>
                <select id="t-category" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color);">
                    </select>
            </div>

            <div class="input-group" style="margin-top: 15px;">
                <label>Descripción</label>
                <input type="text" id="t-description" placeholder="¿En qué gastaste?" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color);">
            </div>

            <div class="input-group" style="margin-top: 15px;">
                <label>Fecha</label>
                <input type="date" id="t-date" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color);">
            </div>

            <div style="display: flex; gap: 15px; margin-top: 25px;">
                <button id="btn-t-cancel" class="btn" style="flex: 1; height: 45px; background: #f3f4f6; border-radius: 8px; font-weight: 600;">Cancelar</button>
                <button id="btn-t-save" class="login-btn btn btn-primary" style="flex: 1; height: 45px; display: flex; align-items: center; justify-content: center; gap: 8px; margin: 0;">
                    <i data-lucide="save" style="width: 18px;"></i>
                    <span>Guardar</span>
                </button>
            </div>
        </div>
    </div>

    <script>lucide.createIcons();</script>
    <script type="module" src="{% static 'src/api/transactions.service.js' %}"></script>
</body>
</html>
