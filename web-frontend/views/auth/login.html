{% extends "base.html" %}
{% load static %}

{% block title %}Econify Pro - Login{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/layouts/auth.css' %}">
{% endblock %}

{% block content %}
<main class="main-content">
    <div class="login-body">
        <div class="login-container">
            <div class="login-card card">
                <div class="login-logo">
                    <img src="{% static 'logo_econify_pro.png' %}" alt="Logo" class="logo-img-small">
                    <span class="logo-text">Econify Pro</span>
                </div>

                <h2 class="login-title">Iniciar sesión</h2>

                <form class="login-form">
                    <div class="input-group">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" placeholder="tuemail@ejemplo.com" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="login-btn btn btn-primary">Entrar</button>

                    <div class="login-links">
                        <a href="/forgot-password/">¿Olvidaste tu contraseña?</a>
                        <a href="{% url 'register_html' %}">Crear cuenta</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
{% endblock %}

{% block extra_js %}
    <script type="module" src="{% static 'src/api/auth.service.js' %}"></script>
{% endblock %}
