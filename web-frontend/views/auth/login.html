{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Econify Pro - Login</title>

    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="{% static 'css/layouts/auth.css' %}">

    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-card card"> <div class="login-logo">
                <div class="logo-icon">
                    <i data-lucide="zap"></i>
                </div>
                <span class="logo-text">Econify Pro</span>
            </div>

            <h2 class="login-title">Iniciar sesión</h2>

            <form class="login-form">
                <div class="input-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="tuemail@ejemplo.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="login-btn btn btn-primary">
                    Entrar
                </button>

                <div class="login-links">
                    <a href="/forgot-password/">¿Olvidaste tu contraseña?</a>
                    <a href="{% url 'register_html' %}">Crear cuenta</a>
                </div>
            </form>
        </div>
    </div>

    <div id="auth-alert" class="custom-alert hidden">
        <div class="alert-content">
            <i data-lucide="alert-circle"></i>
            <span id="alert-message"></span>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>

    <script type="module" src="{% static 'src/api/auth.service.js' %}"></script>
</body>
</html>
