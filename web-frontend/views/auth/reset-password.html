{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Econify Pro - Nueva Contraseña</title>

    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="{% static 'css/layouts/auth.css' %}">
    <link rel="stylesheet" href="{% static 'css/components.css' %}">

    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card card" style="max-width: 550px;">
            <div class="login-logo">
                <div class="logo-icon"><i data-lucide="lock"></i></div>
                <span class="logo-text">Econify Pro</span>
            </div>

            <h2 class="login-title">Nueva contraseña</h2>
            <p style="color: var(--text-secondary); text-align: center; margin-bottom: 24px; font-size: 14px;">
                Crea una contraseña segura para volver a entrar en tu cuenta.
            </p>

            <form id="reset-password-form">
                {% include "auth/components/_password_section.html" with show_btn=True btn_text="Actualizar contraseña" %}
            </form>
        </div>
    </div>

    <div id="auth-alert" class="custom-alert hidden">
        <div class="alert-content">
            <span id="alert-message"></span>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>

    <script type="module" src="{% static 'src/api/reset-password.service.js' %}"></script>
</body>
</html>
