{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Econify Pro - Recuperar Contraseña</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="{% static 'css/layouts/auth.css' %}">
    <link rel="stylesheet" href="{% static 'css/components.css' %}"> <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-card card">
            <div class="login-logo">
                <div class="logo-icon"><i data-lucide="zap"></i></div>
                <span class="logo-text">Econify Pro</span>
            </div>

            <h2 class="login-title">Recuperar acceso</h2>
            <p style="color: var(--text-secondary); text-align: center; margin-bottom: 24px; font-size: 14px;">
                Introduce tu correo para verificar tus preguntas de seguridad.
            </p>

            <form class="forgot-password-form">
                <div class="input-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="tuemail@ejemplo.com" required>
                </div>

                <button type="submit" class="login-btn btn btn-primary">
                    Verificar identidad
                </button>

                <div class="login-links">
                    <a href="/">Volver al inicio de sesión</a>
                </div>
            </form>
        </div>
    </div>

<div id="security-modal" class="custom-modal hidden" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
    <div class="card" style="max-width: 450px; width: 95%; padding: 30px;">

        <div style="text-align: center; margin-bottom: 20px;">
            <div class="logo-icon" style="margin: 0 auto 10px; background: var(--primary-blue); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                <i data-lucide="shield-check"></i>
            </div>
            <h3 style="color: var(--primary-blue); font-size: 1.2rem;">Verificación de Seguridad</h3>
            <p style="font-size: 13px; color: var(--text-secondary);">Responde a tus preguntas para continuar</p>
        </div>

        <div id="questions-content">
            <div class="input-group" style="margin-bottom: 15px;">
                <label id="label-q1" style="color: var(--primary-blue); font-weight: 700;">Cargando pregunta 1...</label>
                <input type="text" id="ans1" placeholder="Tu respuesta aquí" required>
            </div>

            <div class="input-group" style="margin-bottom: 25px;">
                <label id="label-q2" style="color: var(--primary-blue); font-weight: 700;">Cargando pregunta 2...</label>
                <input type="text" id="ans2" placeholder="Tu respuesta aquí" required>
            </div>

            <div style="display: flex; gap: 12px;">
                <button id="verify-btn" class="login-btn" style="flex: 2; margin-top: 0;">
                    <span>Verificar Identidad</span>
                </button>
                <button id="close-modal" class="btn" type="button" style="flex: 1; background: #f3f4f6; color: #4b5563; border: 1px solid #d1d5db; border-radius: var(--radius-md); font-weight: 600; cursor: pointer;">
                    Cancelar
                </button>
            </div>
        </div>
    </div>
</div>

    <div id="auth-alert" class="custom-alert hidden">
    <div class="alert-content">
        <span id="alert-message"></span>
    </div>
</div>

    <script>lucide.createIcons();</script>
    <script type="module" src="{% static 'src/api/forgot-password.service.js' %}"></script>
</body>
</html>
