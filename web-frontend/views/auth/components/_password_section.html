<div class="password-module-container">
    <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start;">
        <div class="input-group">
            <div class="password-label-wrapper">
                <label for="password">Nueva Contraseña</label>
                <span class="info-icon">
                    <i data-lucide="info" style="width: 14px;"></i>
                </span>
            </div>
            <input type="password" id="password" name="password" autocomplete="new-password" placeholder="••••••••">

            <div class="strength-meter-container" style="position: relative; height: 20px;">
                <div class="strength-meter" style="position: absolute; width: 100%; top: 5px;">
                    <div class="strength-bar-container" style="height: 4px; background: #eee; border-radius: 2px;">
                        <div id="strength-bar" style="height: 100%; width: 0; transition: all 0.3s;"></div>
                    </div>
                    <span id="strength-text" style="font-size: 11px; display: block; margin-top: 2px;"></span>
                </div>
            </div>
        </div>

        <div class="input-group">
            <div class="password-label-wrapper"> <label for="confirm_password">Confirmar Contraseña</label>
            </div>
            <input type="password" id="confirm_password" placeholder="••••••••">
        </div>
    </div>

    {% if show_btn %}
    <button type="submit" id="btn-profile-submit" class="login-btn btn btn-primary">
        <i data-lucide="save" style="width: 18px;"></i>
        <span>{{ btn_text|default:"Guardar Cambios" }}</span>
    </button>
    {% endif %}
</div>
