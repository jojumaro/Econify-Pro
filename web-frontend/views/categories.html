{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Econify Pro - Categorías</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="{% static 'css/layouts/dashboard.css' %}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="dashboard-container">
        {% include "layout/_sidebar.html" with active_tab="categories" %}

        <main class="main-content">
            <header class="dashboard-header">
                <div>
                    <h1>Mis Categorías</h1>
                    <p style="color: var(--text-secondary);">Gestiona las etiquetas de tus ingresos y gastos.</p>
                </div>
                <button id="btn-add-category" class="login-btn btn btn-primary" style="width: auto; padding: 0 20px; height: 45px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <i data-lucide="plus" style="width: 18px;"></i>
                    <span>Nueva Categoría</span>
                </button>
            </header>

            <div id="categories-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px;">
                <p>Cargando categorías...</p>
            </div>
        </main>
    </div>

    <div id="category-modal" class="custom-alert hidden" style="background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 1000; display: flex; align-items: center; justify-content: center; position: fixed; inset: 0;">
        <div class="card" style="width: 100%; max-width: 400px; padding: 25px; border-radius: 16px;">
            <h3 id="modal-title">Nueva Categoría</h3>

            <input type="hidden" id="category-id">

            <div class="input-group" style="margin-top: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Nombre de la categoría</label>
                <input type="text" id="category-name" placeholder="Ej: Supermercado" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); outline: none;">
            </div>

            <div class="input-group" style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">Descripción (opcional)</label>
                <textarea id="category-description" placeholder="Ej: Gastos de alimentación diaria..." rows="3" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); outline: none; resize: none; font-family: inherit;"></textarea>
            </div>

            <div style="display: flex; gap: 15px; margin-top: 25px;">
                <button id="btn-cancel" class="btn" style="flex: 1; height: 45px; background: #f3f4f6; color: var(--text-main); border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">
                    Cancelar
                </button>
                <button id="btn-save-category" class="login-btn btn btn-primary" style="flex: 1; height: 45px; display: flex; align-items: center; justify-content: center; gap: 8px; margin: 0;">
                    <i data-lucide="save" style="width: 18px;"></i>
                    <span>Guardar</span>
                </button>
            </div>
        </div>
    </div>

    <script>lucide.createIcons();</script>
    <script type="module" src="{% static 'src/api/categories.service.js' %}"></script>
</body>
</html>
